name: Release Automation
on:
  push:
    tags:
      - "v*" # Triggers automatically when you push a tag like v1.0.0

# --- Opt-in to Node 24 globally to silence deprecation warnings ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_name: typforge-linux.tar.gz
            binary_name: typforge
            use_cross: true # Custom flag to isolate cross execution
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: typforge-windows.zip
            binary_name: typforge.exe
            use_cross: false
          - os: macos-latest
            target: universal-apple-darwin
            archive_name: typforge-macos.zip
            binary_name: typforge.exe # Resolved suffix reference for packaging loop
            use_cross: false

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Installs both targets on macOS, otherwise installs the native matrix target
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin x86_64-apple-darwin' || matrix.target }}

      # Speeds up subsequent compilation tasks
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # Installs and configures cross command layer ONLY when use_cross is true
      - name: Install Cross Toolchain
        if: matrix.use_cross
        uses: houseabsolute/actions-rust-cross@v0
        with:
          target: ${{ matrix.target }}

      # Compiles targets properly (handles macOS Universal stitch engine and Linux Cross containerization)
      - name: Build Release Binary
        shell: bash
        env:
          # FIXES BOTH font-kit AND zed-font-kit (yeslogic-fontconfig-sys) for MUSL inside container
          RUST_FONTCONFIG_DLOPEN: on
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # 1. Compile both segments sequentially
            cargo build --release --target aarch64-apple-darwin
            cargo build --release --target x86_64-apple-darwin

            # 2. Stitch them into a fat universal binary inside our target directory
            mkdir -p target/universal-apple-darwin/release
            lipo -create \
              target/aarch64-apple-darwin/release/typforge \
              target/x86_64-apple-darwin/release/typforge \
              -output target/universal-apple-darwin/release/typforge
          elif [ "${{ matrix.use_cross }}" = "true" ]; then
            # Build using cross instead of cargo. Toolchain & compiler variables are handled inside the container.
            cross build --release --target ${{ matrix.target }} --features typst-kit/vendor-openssl
          else
            # Standard execution path for Windows
            cargo build --release --target ${{ matrix.target }}
          fi

      # Packages and structures payload properly
      - name: Package Directory and Compress
        shell: bash
        run: |
          # 1. Create a clean workspace staging folder
          mkdir typforge-payload

          # 2. Copy the binary and your existing repository folders
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} typforge-payload/
          cp -r themes typforge-payload/ || true
          cp -r documents typforge-payload/ || true

          # 3. Compress based on the operating system
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows target zipped
            powershell -Command "Compress-Archive -Path typforge-payload/* -DestinationPath ${{ matrix.archive_name }}"
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            # Linux target tarballed (preserves permissions)
            tar -czf ${{ matrix.archive_name }} -C typforge-payload .
          else
            # macOS target zipped
            cd typforge-payload && zip -r ../${{ matrix.archive_name }} ./* && cd ..
          fi

      # Official, Node 24-ready script automation to manage the release artifacts safely
      - name: Publish Artifacts to GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ matrix.archive_name }}';

            // Get release by tag
            const tag = context.ref.replace('refs/tags/', '');
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });
            } catch (e) {
              // Create release if it doesn't exist yet
              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                draft: false,
                prerelease: false,
              });
            }

            // Upload the asset
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: path,
              data: fs.readFileSync(path),
            });
